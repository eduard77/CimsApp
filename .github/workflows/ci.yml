name: CI

on:
  push:
    branches: [main, master, 'sprint/**']
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore CimsApp.sln

      - name: Build
        run: dotnet build CimsApp.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test CimsApp.sln --configuration Release --no-build --verbosity normal

  smoke-sqlserver:
    name: SQL Server smoke (B-027)
    runs-on: ubuntu-latest
    # ADR-0015: Linux runner + mssql/server Docker service container.
    # Service container exposes 1433; the app talks to it over TCP at
    # localhost:1433. The CI run gets a fresh container so smoke-step
    # state cannot leak between runs.
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "Strong@Passw0rd!"
          MSSQL_PID: Developer
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P 'Strong@Passw0rd!' -No -Q 'SELECT 1'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
          --health-start-period 30s
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Wait for SQL Server
        # Belt-and-braces on top of the service health-check: GitHub
        # Actions doesn't always wait for service health when the job
        # itself runs on the runner host (not inside a container).
        # 90s cap before failing.
        run: |
          for i in $(seq 1 30); do
            if docker exec ${{ job.services.sqlserver.id }} /opt/mssql-tools18/bin/sqlcmd \
                 -S localhost -U SA -P 'Strong@Passw0rd!' -No -Q 'SELECT 1' >/dev/null 2>&1; then
              echo "SQL Server ready (attempt $i)"
              exit 0
            fi
            echo "Waiting for SQL Server... ($i/30)"
            sleep 3
          done
          echo "SQL Server did not become ready in 90s"
          exit 1

      - name: Restore
        run: dotnet restore CimsApp.sln

      - name: Build
        run: dotnet build CimsApp.sln --configuration Release --no-restore

      - name: Start app (auto-migrates on startup)
        env:
          ConnectionStrings__DefaultConnection: "Server=localhost,1433;Database=cims_ci;User Id=SA;Password=Strong@Passw0rd!;TrustServerCertificate=True;Encrypt=False"
          ASPNETCORE_URLS: "http://localhost:5000"
          ASPNETCORE_ENVIRONMENT: Production
        # Detached app process; PID captured for the stop step.
        # Migrations run on app startup per CimsApp/Program.cs.
        run: |
          mkdir -p artifacts
          nohup dotnet run --project CimsApp --configuration Release --no-build \
            --urls "http://localhost:5000" \
            > artifacts/app.log 2>&1 &
          echo $! > artifacts/app.pid
          echo "App started with PID $(cat artifacts/app.pid)"

      - name: Wait for app /health
        run: |
          for i in $(seq 1 40); do
            if curl -fs http://localhost:5000/health >/dev/null; then
              echo "App ready (attempt $i)"
              exit 0
            fi
            echo "Waiting for app... ($i/40)"
            sleep 2
          done
          echo "App did not become ready in 80s"
          echo "=== App log ==="; cat artifacts/app.log
          exit 1

      - name: Run smoke
        run: bash scripts/ci-smoke.sh

      - name: Show app log on failure
        if: failure()
        run: |
          echo "=== App log ==="
          cat artifacts/app.log || true

      - name: Stop app
        if: always()
        run: |
          if [ -f artifacts/app.pid ]; then
            kill $(cat artifacts/app.pid) 2>/dev/null || true
          fi

      - name: Upload app log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-log
          path: artifacts/app.log
          retention-days: 7
          if-no-files-found: ignore

  migration-round-trip:
    name: Migration round-trip (Up / Down to 0 / Up)
    runs-on: ubuntu-latest
    # T-S8-04. Applies every migration forward, reverts the entire
    # chain via Down() back to the empty schema, then re-applies
    # forward. Catches latent broken Down() methods that the v1.0
    # migration set has never exercised. Cheap insurance.
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "Strong@Passw0rd!"
          MSSQL_PID: Developer
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P 'Strong@Passw0rd!' -No -Q 'SELECT 1'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
          --health-start-period 30s
    env:
      ConnectionStrings__DefaultConnection: "Server=localhost,1433;Database=cims_migrate;User Id=SA;Password=Strong@Passw0rd!;TrustServerCertificate=True;Encrypt=False"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Wait for SQL Server
        run: |
          for i in $(seq 1 30); do
            if docker exec ${{ job.services.sqlserver.id }} /opt/mssql-tools18/bin/sqlcmd \
                 -S localhost -U SA -P 'Strong@Passw0rd!' -No -Q 'SELECT 1' >/dev/null 2>&1; then
              echo "SQL Server ready (attempt $i)"
              exit 0
            fi
            echo "Waiting for SQL Server... ($i/30)"
            sleep 3
          done
          echo "SQL Server did not become ready in 90s"
          exit 1

      - name: Install dotnet-ef
        run: |
          dotnet tool install --global dotnet-ef --version 8.*
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Restore
        run: dotnet restore CimsApp.sln

      - name: Build
        run: dotnet build CimsApp.sln --configuration Release --no-restore

      - name: Apply all migrations (Up)
        run: dotnet ef database update --project CimsApp --no-build --configuration Release

      - name: Revert all migrations (Down to 0)
        run: dotnet ef database update 0 --project CimsApp --no-build --configuration Release

      - name: Re-apply all migrations (Up)
        run: dotnet ef database update --project CimsApp --no-build --configuration Release
