name: CI

on:
  push:
    branches: [main, master, 'sprint/**']
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore CimsApp.sln

      - name: Build
        run: dotnet build CimsApp.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test CimsApp.sln --configuration Release --no-build --verbosity normal
